name: CI - Mapandan Portal

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 💎 Prisma Schema Validation
        run: npx prisma validate
        # Validates schema without needing a database connection

      - name: ⚙️ Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://mockuser:mockpass@localhost:5432/mockdb"

      - name: 🧹 Lint Check
        run: npm run lint

      - name: ⌨️ TypeScript Type Check
        run: npx tsc --noEmit
        # Ensures no type errors before the build starts

      - name: 🏗️ Production Build Check
        run: npm run build
        env:
          DATABASE_URL: "postgresql://mockuser:mockpass@localhost:5432/mockdb"
          NEXTAUTH_SECRET: "mock-secret-for-build"
          NEXTAUTH_URL: "http://localhost:3000"
